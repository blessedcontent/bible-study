name: Send Daily Study Notification

on:
  schedule:
    # 6:53 AM Central = 11:53 UTC (CDT) or 12:53 UTC (CST)
    # Odd minute (53) dodges top-of-hour GitHub Actions runner congestion.
    # Cron is set ~75 min earlier than target delivery to compensate for runner-allocation lag.
    # TODO: Bump to '53 12 * * *' in November for CST
    - cron: '53 11 * * *'
  workflow_dispatch: # Allow manual trigger for testing

permissions:
  contents: read

jobs:
  send-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install firebase-admin@12 google-auth-library@9

      - name: Send push notification
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/send-notification.js
