name: Publish Daily Bible Study

on:
  push:
    branches: [main]
  schedule:
    # 8 PM UTC = 3 PM CDT (Central Daylight) / In Nov bump to '0 21' for 3 PM CST year-round
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Publish tomorrow's study from staging
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          # At 8 PM UTC, tomorrow in Central Time is +1 day in UTC
          TOMORROW=$(date -u -d "+1 day" +%Y-%m-%d)
          FILE="staging/${TOMORROW}.html"

          if [ -f "$FILE" ]; then
            echo "Publishing ${TOMORROW}.html"
            cp "$FILE" "${TOMORROW}.html"
            rm "$FILE"
          else
            echo "No file found for ${TOMORROW} in staging/"
            exit 0
          fi

      - name: Regenerate sitemap.xml
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          python3 - << 'SITEMAP_EOF'
          import os, datetime

          base = 'https://blessedcontent.github.io/bible-study'
          files = sorted([f for f in os.listdir('.') if f.endswith('.html')])

          xml = '<?xml version="1.0" encoding="UTF-8"?>\n'
          xml += '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n'

          for f in files:
              url = f'{base}/{f}'
              lastmod = datetime.date.today().isoformat()
              xml += f'  <url>\n    <loc>{url}</loc>\n    <lastmod>{lastmod}</lastmod>\n  </url>\n'

          xml += '</urlset>\n'

          with open('sitemap.xml', 'w') as fh:
              fh.write(xml)

          print(f'Sitemap updated with {len(files)} entries')
          SITEMAP_EOF

      - name: Commit and push
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          TOMORROW=$(date -u -d "+1 day" +%Y-%m-%d)
          git commit -m "Publish ${TOMORROW} daily study"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4